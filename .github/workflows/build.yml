name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: 
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=latest
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build Docker image for single platform
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        outputs: type=docker,dest=/tmp/image.tar
        platforms: ${{ matrix.platform }}
        file: ./Dockerfile
    
    - name: Convert platform name for filename
      id: platform
      run: |
        PLATFORM_NAME=$(echo "${{ matrix.platform }}" | sed 's#/#-#g')
        echo "name=$PLATFORM_NAME" >> $GITHUB_OUTPUT
    
    - name: Rename and compress image
      run: |
        cd /tmp
        mv image.tar my-nginx-${{ steps.platform.outputs.name }}.tar
        gzip -v my-nginx-${{ steps.platform.outputs.name }}.tar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-images
        path: /tmp/my-nginx-*.tar.gz

  publish-multiarch:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION=latest
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Build and push multi-platform Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/my-nginx:${{ steps.meta.outputs.version }}
          ${{ secrets.DOCKER_USERNAME }}/my-nginx:latest
        file: ./Dockerfile

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: docker-images
        path: ./docker-images
    
    - name: List artifacts
      run: ls -lh docker-images/
    
    - name: Create Release with artifacts
      uses: ncipollo/release-action@v1
      with:
        artifacts: "docker-images/my-nginx-*.tar.gz"
        bodyFile: "RELEASE_NOTES.md"
        token: ${{ secrets.GITHUB_TOKEN }}
