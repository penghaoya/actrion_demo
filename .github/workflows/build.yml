name: Build And Release Docker Archives

on:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main, master ]
    paths:
      - ".github/workflows/build.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "GridPredict_OceanMeteo/**"
  workflow_dispatch:

concurrency:
  group: docker-archives-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: gridpredict-oceanmeteo

permissions:
  contents: read

jobs:
  build-archives:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            archive_suffix: linux-amd64
          - platform: linux/arm64
            archive_suffix: linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.archive_suffix }}
          push: false
          provenance: false
          outputs: type=docker,dest=/tmp/${{ env.IMAGE_NAME }}-${{ matrix.archive_suffix }}.tar
          cache-from: type=gha,scope=archive-${{ matrix.archive_suffix }}
          cache-to: type=gha,mode=max,scope=archive-${{ matrix.archive_suffix }}

      - name: Compress Docker archive
        run: gzip -f -9 /tmp/${IMAGE_NAME}-${{ matrix.archive_suffix }}.tar

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-archive-${{ matrix.archive_suffix }}
          path: /tmp/${{ env.IMAGE_NAME }}-${{ matrix.archive_suffix }}.tar.gz
          compression-level: 0

  release:
    needs: build-archives
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          pattern: docker-archive-*
          path: ./release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*.tar.gz
          generate_release_notes: true
