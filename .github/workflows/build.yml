name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: my-nginx

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Convert platform name for filename
      id: platform
      run: |
        PLATFORM_NAME=$(echo "${{ matrix.platform }}" | sed 's#/#-#g')
        echo "name=$PLATFORM_NAME" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image for single platform
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        platforms: ${{ matrix.platform }}
        push: false
        outputs: type=docker,dest=/tmp/image.tar
        cache-from: type=gha,scope=build-${{ steps.platform.outputs.name }}
        cache-to: type=gha,mode=max,scope=build-${{ steps.platform.outputs.name }}

    - name: Rename and compress image
      run: |
        cd /tmp
        mv image.tar ${IMAGE_NAME}-${{ steps.platform.outputs.name }}.tar
        gzip -v ${IMAGE_NAME}-${{ steps.platform.outputs.name }}.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-${{ steps.platform.outputs.name }}
        path: /tmp/${{ env.IMAGE_NAME }}-${{ steps.platform.outputs.name }}.tar.gz
        compression-level: 0

  publish-multiarch:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Compute Docker tags
      id: meta
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/}"
          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION}"
            echo "${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push multi-platform Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha,scope=publish-multiarch
        cache-to: type=gha,mode=max,scope=publish-multiarch

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: docker-image-*
        path: ./docker-images
        merge-multiple: true

    - name: List artifacts
      run: ls -lh docker-images/

    - name: Create Release with artifacts
      uses: ncipollo/release-action@v1
      with:
        artifacts: "docker-images/${{ env.IMAGE_NAME }}-*.tar.gz"
        bodyFile: "RELEASE_NOTES.md"
        token: ${{ secrets.GITHUB_TOKEN }}
