name: Build and Release Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: my-nginx

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Convert platform name for filename
      id: platform
      run: |
        PLATFORM_NAME=$(echo "${{ matrix.platform }}" | sed 's#/#-#g')
        echo "name=$PLATFORM_NAME" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image for single platform
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        platforms: ${{ matrix.platform }}
        push: false
        outputs: type=docker,dest=/tmp/image.tar
        cache-from: type=gha,scope=build-${{ steps.platform.outputs.name }}
        cache-to: type=gha,mode=max,scope=build-${{ steps.platform.outputs.name }}

    - name: Rename and compress image
      run: |
        cd /tmp
        mv image.tar ${IMAGE_NAME}-${{ steps.platform.outputs.name }}.tar
        gzip -v ${IMAGE_NAME}-${{ steps.platform.outputs.name }}.tar

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-${{ steps.platform.outputs.name }}
        path: /tmp/${{ env.IMAGE_NAME }}-${{ steps.platform.outputs.name }}.tar.gz
        compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: docker-image-*
        path: ./docker-images
        merge-multiple: true

    - name: List artifacts
      run: ls -lh docker-images/

    - name: Create Release with artifacts
      uses: ncipollo/release-action@v1
      with:
        artifacts: "docker-images/${{ env.IMAGE_NAME }}-*.tar.gz"
        bodyFile: "RELEASE_NOTES.md"
        token: ${{ secrets.GITHUB_TOKEN }}
